nameReference:
- kind: Secret
  version: v1
  fieldSpecs:
  - kind: Deployment
    path: spec/template/spec/volumes/secret/secretName
- kind: Service
  version: v1
  fieldSpecs:
  - kind: ValidatingWebhookConfiguration
    group: admissionregistration.k8s.io
    path: webhooks/clientConfig/service/name
