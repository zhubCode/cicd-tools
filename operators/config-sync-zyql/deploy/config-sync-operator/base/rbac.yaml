apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-sync-operator
  namespace: config-sync-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: config-sync-operator-role
rules:
- apiGroups:
  - config.zyql.com
  resources:
  - configsyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - config.zyql.com
  resources:
  - configsyncs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - config.zyql.com
  resources:
  - configsyncs/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: config-sync-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: config-sync-operator-role
subjects:
- kind: ServiceAccount
  name: config-sync-operator
  namespace: config-sync-system
