apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: alibaba-rrsa-store
    kind: ClusterSecretStore
  target:
    name: gitlab-runner
    template:
      type: Opaque
      metadata:
        labels:
          app: gitlab-runner
      data:
        runner-registration-aios-token: ""
        runner-aios-token: "{{ .gitlab_runner_aios_token }}"
        runner-registration-framework-token: ""
        runner-framework-token: "{{ .gitlab_runner_framework_token }}"
        
  data:
    - secretKey: gitlab_runner_aios_token
      remoteRef:
        key: /zyql/aios/gitlab/runner/secret
        property: gitlab-runner-aios-token
    - secretKey: gitlab_runner_framework_token
      remoteRef:
        key: /zyql/aios/gitlab/runner/secret
        property: gitlab-runner-framework-token
